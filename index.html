<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Me</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e0e0e0;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 48px 56px;
      max-width: 680px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #533483);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 24px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .tagline {
      text-align: center;
      color: #e94560;
      font-size: 1rem;
      margin-bottom: 32px;
      letter-spacing: 1px;
    }

    .section {
      margin-bottom: 28px;
    }

    .section h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #e94560;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(233, 69, 96, 0.3);
      padding-bottom: 6px;
    }

    .section p {
      line-height: 1.7;
      color: #b0b0c0;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .skill-tag {
      background: rgba(83, 52, 131, 0.4);
      border: 1px solid rgba(83, 52, 131, 0.6);
      color: #c0aaff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
    }

    .contact-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .contact-links a {
      color: #e94560;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .contact-links a:hover {
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>Shih-Jie Huang</h1>
    <p class="tagline">Software Developer</p>

    <div class="section">
      <h2>About</h2>
      <p>
        熱愛打造優雅、高效的軟體解決方案。對於前後端開發、系統架構與 AI 應用整合充滿熱情，
        持續學習並探索新技術。
      </p>
    </div>

    <div class="section">
      <h2>Skills</h2>
      <div class="skills">
        <span class="skill-tag">JavaScript</span>
        <span class="skill-tag">TypeScript</span>
        <span class="skill-tag">Python</span>
        <span class="skill-tag">React</span>
        <span class="skill-tag">Node.js</span>
        <span class="skill-tag">Git</span>
        <span class="skill-tag">Docker</span>
        <span class="skill-tag">AI / LLM</span>
      </div>
    </div>

    <div class="section">
      <h2>Contact</h2>
      <div class="contact-links">
        <a href="mailto:shihjie@example.com">Email</a>
        <a href="https://github.com/shihjie" target="_blank">GitHub</a>
        <a href="https://linkedin.com/in/shihjie" target="_blank">LinkedIn</a>
      </div>
    </div>
  </div>
</body>
</html>
